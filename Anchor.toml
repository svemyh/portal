[toolchain]
anchor_version = "0.29.0"

[features]
seeds = true
skip-lint = false

[programs.mainnet]
portal = "REPLACE_WITH_YOUR_PROGRAM_ID"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "mainnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
