<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>portal — enroll</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: black;
    color: white;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    cursor: crosshair;
    padding: 24px;
  }
  h1 { font-size: 14px; letter-spacing: 4px; opacity: 0.5; }
  .card {
    border: 1px solid rgba(255,255,255,0.15);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 460px;
  }
  label { opacity: 0.5; letter-spacing: 2px; font-size: 11px; }
  input[type="text"], input[type="password"] {
    background: none;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-family: inherit;
    font-size: 13px;
    padding: 6px 0;
    width: 100%;
    outline: none;
    cursor: crosshair;
    letter-spacing: 2px;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-bottom-color: white;
  }
  button {
    background: none;
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 3px;
    padding: 10px 20px;
    cursor: crosshair;
    transition: border-color 0.15s;
  }
  button:hover { border-color: white; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .row { display: flex; gap: 10px; }
  .row button { flex: 1; }
  video, canvas, img {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.1);
    display: none;
  }
  #dropZone {
    border: 1px dashed rgba(255,255,255,0.3);
    padding: 28px;
    text-align: center;
    letter-spacing: 2px;
    font-size: 11px;
    opacity: 0.5;
    transition: border-color 0.15s, opacity 0.15s;
    cursor: crosshair;
  }
  #dropZone.over {
    border-color: white;
    opacity: 1;
  }
  #status {
    letter-spacing: 2px;
    font-size: 11px;
    min-height: 18px;
    opacity: 0.7;
  }
  #status.ok  { color: #00ff88; opacity: 1; }
  #status.err { color: #ff4444; opacity: 1; }
  .divider { border-top: 1px solid rgba(255,255,255,0.1); }
  #authCard { max-width: 360px; }
</style>
</head>
<body>

<h1>PORTAL / ENROLL</h1>

<!-- auth gate -->
<div class="card" id="authCard">
  <label>ADMIN KEY</label>
  <input type="password" id="adminKey" placeholder="enter admin key" autocomplete="off">
  <button onclick="unlock()">UNLOCK</button>
  <div id="authStatus" class="err"></div>
</div>

<!-- enrollment form (hidden until unlocked) -->
<div class="card" id="enrollCard" style="display:none">
  <label>PORTAL KEY</label>
  <input type="text" id="portalKey" placeholder="e.g. ABCD1234" maxlength="32"
         style="text-transform:uppercase">

  <div class="divider"></div>

  <!-- live camera -->
  <video id="camPreview" autoplay muted playsinline></video>
  <!-- uploaded photo preview -->
  <img id="photoPreview">
  <!-- capture canvas (hidden) -->
  <canvas id="captureCanvas"></canvas>

  <button onclick="startCamera()">USE CAMERA</button>

  <div id="dropZone" onclick="document.getElementById('fileInput').click()">
    DROP PHOTO HERE<br><span style="opacity:0.5;font-size:10px">or click to browse</span>
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadPhoto(event)">

  <button id="captureBtn" onclick="captureFrame()" style="display:none">CAPTURE FRAME</button>

  <div class="divider"></div>
  <div id="status"></div>
  <button id="enrollBtn" onclick="enroll()" disabled>ENROLL FACE</button>
</div>

<script>
let adminKeyValue = "";
let capturedB64   = null;
let stream        = null;

const camPreview    = document.getElementById("camPreview");
const photoPreview  = document.getElementById("photoPreview");
const captureCanvas = document.getElementById("captureCanvas");
const captureBtn    = document.getElementById("captureBtn");
const enrollBtn     = document.getElementById("enrollBtn");
const statusEl      = document.getElementById("status");

function setStatus(msg, type) {
  statusEl.innerText = msg;
  statusEl.className = type || "";
}

/* ---- auth ---- */
function unlock() {
  const val = document.getElementById("adminKey").value.trim();
  if (!val) return;
  adminKeyValue = val;
  document.getElementById("authCard").style.display = "none";
  document.getElementById("enrollCard").style.display = "flex";
}
document.getElementById("adminKey").addEventListener("keydown", e => {
  if (e.key === "Enter") unlock();
});
document.getElementById("portalKey").addEventListener("input", e => {
  e.target.value = e.target.value.toUpperCase();
});

/* ---- camera ---- */
async function startCamera() {
  stopCamera();
  photoPreview.style.display = "none";
  capturedB64 = null;
  enrollBtn.disabled = true;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    camPreview.srcObject = stream;
    camPreview.style.display = "block";
    captureBtn.style.display = "block";
    setStatus("camera ready — capture a clear face shot");
  } catch (e) {
    setStatus("camera unavailable: " + e.message, "err");
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  camPreview.style.display = "none";
  captureBtn.style.display = "none";
}

function captureFrame() {
  const w = camPreview.videoWidth, h = camPreview.videoHeight;
  if (!w || !h) return;
  captureCanvas.width  = w;
  captureCanvas.height = h;
  captureCanvas.getContext("2d").drawImage(camPreview, 0, 0);
  capturedB64 = captureCanvas.toDataURL("image/jpeg", 0.9);
  stopCamera();
  photoPreview.src = capturedB64;
  photoPreview.style.display = "block";
  enrollBtn.disabled = false;
  setStatus("frame captured — click ENROLL FACE");
}

/* ---- photo upload ---- */
function loadFile(file) {
  if (!file || !file.type.startsWith("image/")) {
    setStatus("please drop an image file", "err");
    return;
  }
  stopCamera();
  const reader = new FileReader();
  reader.onload = (e) => {
    capturedB64 = e.target.result;
    photoPreview.src = capturedB64;
    photoPreview.style.display = "block";
    enrollBtn.disabled = false;
    setStatus("photo loaded — click ENROLL FACE");
  };
  reader.readAsDataURL(file);
}

function loadPhoto(event) { loadFile(event.target.files[0]); }

const dropZone = document.getElementById("dropZone");
dropZone.addEventListener("dragover",  (e) => { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", ()  => { dropZone.classList.remove("over"); });
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("over");
  loadFile(e.dataTransfer.files[0]);
});

/* ---- enroll ---- */
async function enroll() {
  const key = document.getElementById("portalKey").value.trim().toUpperCase();
  if (!key)        { setStatus("enter a portal key", "err"); return; }
  if (!capturedB64){ setStatus("capture or upload a photo first", "err"); return; }

  enrollBtn.disabled = true;
  setStatus("enrolling...");

  try {
    const res = await fetch("/face/enroll", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-key": adminKeyValue,
      },
      body: JSON.stringify({ portal_key: key, image_b64: capturedB64 }),
    });
    const data = await res.json();
    if (res.ok) {
      setStatus(`enrolled: ${key}`, "ok");
      capturedB64 = null;
      photoPreview.style.display = "none";
      photoPreview.src = "";
      document.getElementById("portalKey").value = "";
    } else {
      setStatus(data.error || data.detail || "enrollment failed", "err");
    }
  } catch (e) {
    setStatus("network error: " + e.message, "err");
  } finally {
    enrollBtn.disabled = false;
  }
}
</script>

</body>
</html>
