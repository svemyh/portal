<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>portal — enroll</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: black;
    color: white;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    cursor: crosshair;
    padding: 100px 24px 24px;
  }
  #title {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9000;
    text-align: center;
    font-size: 14px;
  }
  #title span { font-size: 11px; opacity: 0.6; }
  .card {
    border: 1px solid rgba(255,255,255,0.15);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 460px;
  }
  label { opacity: 0.5; letter-spacing: 2px; font-size: 11px; }
  input[type="text"], input[type="password"] {
    background: none;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-family: inherit;
    font-size: 13px;
    padding: 6px 0;
    width: 100%;
    outline: none;
    cursor: crosshair;
    letter-spacing: 2px;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-bottom-color: white;
  }
  button {
    background: none;
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 3px;
    padding: 10px 20px;
    cursor: crosshair;
    transition: border-color 0.15s;
  }
  button:hover { border-color: white; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .row { display: flex; gap: 10px; }
  .row button { flex: 1; }
  video, canvas, img {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.1);
    display: none;
  }
  #dropZone {
    border: 1px dashed rgba(255,255,255,0.3);
    padding: 28px;
    text-align: center;
    letter-spacing: 2px;
    font-size: 11px;
    opacity: 0.5;
    transition: border-color 0.15s, opacity 0.15s;
    cursor: crosshair;
  }
  #dropZone.over {
    border-color: white;
    opacity: 1;
  }
  #status {
    letter-spacing: 2px;
    font-size: 11px;
    min-height: 18px;
    opacity: 0.7;
  }
  #status.ok  { color: #00ff88; opacity: 1; }
  #status.err { color: #ff4444; opacity: 1; }
  .divider { border-top: 1px solid rgba(255,255,255,0.1); }
  #authCard { max-width: 360px; }
  #enrollmentsCard { max-width: 460px; }
  #enrollmentsCard label { display: flex; justify-content: space-between; align-items: baseline; }
  #enrollCount { opacity: 1; font-size: 13px; letter-spacing: 1px; }
  .enroll-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 12px;
    letter-spacing: 2px;
  }
  .enroll-row:last-child { border-bottom: none; }
  .chain-badge {
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 6px;
    border: 1px solid;
    opacity: 0.8;
  }
  .chain-badge.on-chain  { color: #00ff88; border-color: #00ff88; }
  .chain-badge.private   { color: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.2); }
  .chain-badge.unknown   { color: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.15); }
  #enrollList { display: flex; flex-direction: column; gap: 0; }
  #enrollEmpty { opacity: 0.35; font-size: 11px; letter-spacing: 2px; text-align: center; padding: 10px 0; }
</style>
</head>
<body>

<div id="title">portal<br><span>v0.0.9</span></div>

<!-- auth gate -->
<div class="card" id="authCard">
  <label>ADMIN KEY</label>
  <input type="password" id="adminKey" placeholder="enter admin key" autocomplete="off">
  <button onclick="unlock()">UNLOCK</button>
  <div id="authStatus" class="err" style="font-size:11px;letter-spacing:2px;min-height:16px"></div>
</div>

<!-- enrolled faces registry (hidden until unlocked) -->
<div class="card" id="enrollmentsCard" style="display:none">
  <label>
    <span>FACE SERVICE</span>
    <span id="enrollCount">—</span>
  </label>
  <div id="enrollList"><div id="enrollEmpty">no faces enrolled</div></div>
  <button onclick="loadEnrollments()" style="font-size:10px;letter-spacing:2px;padding:6px 12px">REFRESH</button>
</div>

<!-- enrollment form (hidden until unlocked) -->
<div class="card" id="enrollCard" style="display:none">
  <label>PORTAL KEY</label>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="portalKeyDisplay" style="letter-spacing:4px;font-size:14px;opacity:0.35;flex:1">— — — — — — — —</span>
    <button onclick="generateKey()" style="font-size:10px;letter-spacing:2px;padding:6px 12px;white-space:nowrap">GENERATE</button>
  </div>

  <div class="divider"></div>

  <!-- live camera -->
  <video id="camPreview" autoplay muted playsinline></video>
  <!-- uploaded photo preview -->
  <img id="photoPreview">
  <!-- capture canvas (hidden) -->
  <canvas id="captureCanvas"></canvas>

  <button onclick="startCamera()">USE CAMERA</button>

  <div id="dropZone" onclick="document.getElementById('fileInput').click()">
    DROP PHOTO HERE<br><span style="opacity:0.5;font-size:10px">or click to browse</span>
  </div>
  <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadPhoto(event)">

  <button id="captureBtn" onclick="captureFrame()" style="display:none">CAPTURE FRAME</button>

  <div class="divider"></div>
  <div id="enrollStatus"></div>
  <button id="enrollBtn" onclick="enroll()" disabled>ENROLL</button>
</div>

<script>
let adminKeyValue = "";
let capturedB64   = null;
let stream        = null;

/* pre-warm face service so it's ready when we enroll */
fetch("/face/health").catch(() => {});

const camPreview    = document.getElementById("camPreview");
const photoPreview  = document.getElementById("photoPreview");
const captureCanvas = document.getElementById("captureCanvas");
const captureBtn    = document.getElementById("captureBtn");
const enrollBtn     = document.getElementById("enrollBtn");
const statusEl      = document.getElementById("enrollStatus");

function setStatus(msg, type) {
  statusEl.innerText = msg;
  statusEl.className = type || "";
}

/* ---- auth ---- */
async function unlock() {
  const val = document.getElementById("adminKey").value.trim();
  if (!val) return;
  const authStatus = document.getElementById("authStatus");
  authStatus.innerText = "checking...";
  authStatus.className = "";
  try {
    const res = await fetch("/admin/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-admin-key": val },
      body: JSON.stringify({}),
    });
    if (!res.ok) {
      authStatus.innerText = "invalid key";
      authStatus.className = "err";
      return;
    }
  } catch (e) {
    authStatus.innerText = "server error: " + e.message;
    authStatus.className = "err";
    return;
  }
  adminKeyValue = val;
  document.getElementById("authCard").style.display = "none";
  document.getElementById("enrollmentsCard").style.display = "flex";
  document.getElementById("enrollCard").style.display = "flex";
  loadEnrollments();
}
document.getElementById("adminKey").addEventListener("keydown", e => {
  if (e.key === "Enter") unlock();
});
let currentPortalKey = "";

/* ---- camera ---- */
async function startCamera() {
  stopCamera();
  photoPreview.style.display = "none";
  capturedB64 = null;
  enrollBtn.disabled = true;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    camPreview.srcObject = stream;
    camPreview.style.display = "block";
    captureBtn.style.display = "block";
    setStatus("camera ready — capture a clear face shot");
  } catch (e) {
    setStatus("camera unavailable: " + e.message, "err");
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  camPreview.style.display = "none";
  captureBtn.style.display = "none";
}

function captureFrame() {
  const w = camPreview.videoWidth, h = camPreview.videoHeight;
  if (!w || !h) return;
  captureCanvas.width  = w;
  captureCanvas.height = h;
  captureCanvas.getContext("2d").drawImage(camPreview, 0, 0);
  capturedB64 = captureCanvas.toDataURL("image/jpeg", 0.9);
  stopCamera();
  photoPreview.src = capturedB64;
  photoPreview.style.display = "block";
  enrollBtn.disabled = !currentPortalKey;
  setStatus("frame captured — click ENROLL FACE");
}

/* ---- photo upload ---- */
function loadFile(file) {
  if (!file || !file.type.startsWith("image/")) {
    setStatus("please drop an image file", "err");
    return;
  }
  stopCamera();
  const reader = new FileReader();
  reader.onload = (e) => {
    capturedB64 = e.target.result;
    photoPreview.src = capturedB64;
    photoPreview.style.display = "block";
    enrollBtn.disabled = !currentPortalKey;
    setStatus("photo loaded — click ENROLL FACE");
  };
  reader.readAsDataURL(file);
}

function loadPhoto(event) { loadFile(event.target.files[0]); }

const dropZone = document.getElementById("dropZone");
dropZone.addEventListener("dragover",  (e) => { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", ()  => { dropZone.classList.remove("over"); });
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("over");
  loadFile(e.dataTransfer.files[0]);
});

/* ---- enrollments registry ---- */
async function loadEnrollments() {
  const listEl  = document.getElementById("enrollList");
  const countEl = document.getElementById("enrollCount");
  listEl.innerHTML = "<div style='opacity:0.35;font-size:11px;letter-spacing:2px;text-align:center;padding:10px 0'>loading...</div>";
  try {
    const res = await fetch("/admin/enrollments", {
      headers: { "x-admin-key": adminKeyValue },
    });
    if (!res.ok) { listEl.innerHTML = "<div id='enrollEmpty'>error loading enrollments</div>"; return; }
    const { count, enrollments } = await res.json();
    countEl.innerText = count;
    if (!enrollments || enrollments.length === 0) {
      listEl.innerHTML = "<div id='enrollEmpty'>no faces enrolled</div>";
      return;
    }
    /* Group guests under their parent key */
    const parents = {};
    const guests  = {};
    for (const e of enrollments) {
      if (e.key.includes(":")) {
        const base = e.key.split(":")[0];
        if (!guests[base]) guests[base] = [];
        guests[base].push(e);
      } else {
        parents[e.key] = e;
      }
    }
    /* Also surface any orphan guest keys (parent not enrolled) */
    for (const base of Object.keys(guests)) {
      if (!parents[base]) parents[base] = { key: base, chain: "unknown", orphan: true };
    }

    const deleteBtn = (rawKey, chain) => chain === "private" || rawKey.includes(":")
      ? `<button onclick="deleteEnrollment('${rawKey}')" style="font-size:9px;letter-spacing:1px;padding:2px 7px;border:1px solid rgba(255,80,80,0.4);color:rgba(255,100,100,0.7);background:none;cursor:crosshair" onmouseover="this.style.borderColor='#ff4444';this.style.color='#ff4444'" onmouseout="this.style.borderColor='rgba(255,80,80,0.4)';this.style.color='rgba(255,100,100,0.7)'">✕</button>`
      : "";

    listEl.innerHTML = Object.values(parents).map(({ key, chain, orphan }) => {
      const guestRows = (guests[key] || []).map((g, i) => `
        <div class="enroll-row" id="row-${g.key}" style="padding-left:18px;opacity:0.75">
          <span style="font-size:11px">↳ guest ${i + 1}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="chain-badge ${chain}" style="font-size:9px">guest</span>
            ${deleteBtn(g.key, chain)}
          </div>
        </div>`).join("");
      return `
        <div class="enroll-row" id="row-${key}" ${orphan ? 'style="opacity:0.5"' : ""}>
          <span>${key}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="chain-badge ${chain}">${chain}</span>
            ${deleteBtn(key, chain)}
          </div>
        </div>${guestRows}`;
    }).join("");
  } catch (e) {
    listEl.innerHTML = "<div id='enrollEmpty'>face service unavailable</div>";
  }
}

/* ---- generate key ---- */
async function generateKey() {
  const btn = document.querySelector('#enrollCard button[onclick="generateKey()"]');
  btn.disabled = true;
  btn.innerText = "...";
  try {
    const res = await fetch("/admin/generate-key", {
      method: "POST",
      headers: { "x-admin-key": adminKeyValue },
    });
    const data = await res.json();
    if (res.ok) {
      currentPortalKey = data.portalKey;
      const display = document.getElementById("portalKeyDisplay");
      display.innerText = currentPortalKey;
      display.style.opacity = "1";
      enrollBtn.disabled = !capturedB64;
    } else {
      setStatus(data.error || "key generation failed", "err");
    }
  } catch (e) {
    setStatus("network error: " + e.message, "err");
  } finally {
    btn.disabled = false;
    btn.innerText = "GENERATE";
  }
}

/* ---- delete enrollment ---- */
async function deleteEnrollment(key) {
  if (!confirm(`Remove face enrollment for ${key}?`)) return;
  try {
    const res = await fetch(`/admin/enrollments/${encodeURIComponent(key)}`, {
      method: "DELETE",
      headers: { "x-admin-key": adminKeyValue },
    });
    const data = await res.json();
    if (res.ok) {
      const row = document.getElementById(`row-${key}`);
      if (row) row.remove();
      const countEl = document.getElementById("enrollCount");
      countEl.innerText = Math.max(0, parseInt(countEl.innerText || "0") - 1);
      const listEl = document.getElementById("enrollList");
      if (!listEl.querySelector(".enroll-row")) {
        listEl.innerHTML = "<div id='enrollEmpty'>no faces enrolled</div>";
      }
    } else {
      alert(data.error || "delete failed");
    }
  } catch (e) {
    alert("network error: " + e.message);
  }
}

/* ---- enroll ---- */
async function enroll() {
  const key = currentPortalKey;
  if (!key)        { setStatus("generate a portal key first", "err"); return; }
  if (!capturedB64){ setStatus("capture or upload a photo first", "err"); return; }

  enrollBtn.disabled = true;
  setStatus("enrolling...");

  try {
    const res = await fetch("/face/enroll", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-admin-key": adminKeyValue,
      },
      body: JSON.stringify({ portal_key: key, image_b64: capturedB64 }),
    });
    const data = await res.json();
    if (res.ok) {
      setStatus(`enrolled: ${key}`, "ok");
      capturedB64 = null;
      photoPreview.style.display = "none";
      photoPreview.src = "";
      currentPortalKey = "";
      const display = document.getElementById("portalKeyDisplay");
      display.innerText = "— — — — — — — —";
      display.style.opacity = "0.35";
      enrollBtn.disabled = true;
      loadEnrollments();
    } else {
      setStatus(data.error || data.detail || "enrollment failed", "err");
    }
  } catch (e) {
    setStatus("network error: " + e.message, "err");
  } finally {
    enrollBtn.disabled = false;
  }
}
</script>

</body>
</html>
