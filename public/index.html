<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>portal</title>

<style>

* {
  font-family: "Courier New", Courier, monospace;
}

body {
  margin: 0;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

#container {
  text-align: center;
}

#title {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  letter-spacing: 1px;
  z-index: 1001;
}

#title span {
  font-size: 11px;
  opacity: 0.6;
}

video {
  width: 40vw;
  max-width: 400px;
  margin: 10px;
  background: black;
}

input {
  background: black;
  color: white;
  border: 1px solid white;
  padding: 10px;
}

button {
  margin-left: 10px;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}

#status {
  position: relative;
  z-index: 1001;
  margin: 10px 0;
}

.connected #local {
  display: none;
}

.connected #label-local {
  display: none;
}

.connected #label-remote {
  display: none;
}

.connected #remote {
  position: fixed;
  top: 50%;
  left: 50%;
  height: 100vh;
  width: 100vw;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: 999;
  background: black;
}

</style>
</head>

<body>

<div id="container">

  <div id="title">
    portal<br>
    <span>v0.0.2</span>
  </div>

  <div id="entry">
    <input id="code" placeholder="enter code" />
    <button onclick="join()">enter</button>
  </div>

  <div id="stage" style="display:none;">

    <div id="label-local">#?</div>

    <video
      id="local"
      autoplay
      muted
      playsinline>
    </video>

    <div id="status">waiting...</div>

    <div id="label-remote">#?</div>

    <video
      id="remote"
      autoplay
      playsinline>
    </video>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let localStream;
let pc;
let currentCode;
let myUserNumber = null;

async function join() {

  const code =
    document.getElementById("code")
    .value
    .trim();

  if (!code) return;

  currentCode = code;

  localStream =
    await navigator.mediaDevices.getUserMedia({

      video: {
        width: { ideal: 640 },
        height: { ideal: 480 },
        frameRate: { ideal: 24, max: 30 }
      },

      audio: true
    });

  document.getElementById("local").srcObject =
    localStream;

  document.getElementById("entry").style.display =
    "none";

  document.getElementById("stage").style.display =
    "block";

  document.getElementById("status").innerText =
    "waiting...";

  socket.emit("join", code);
}

socket.on("assigned", ({ userNumber }) => {

  myUserNumber = userNumber;

  document.getElementById("label-local").innerText =
    "#" + userNumber;
});

socket.on("full", () => {

  alert("room full");

  location.reload();
});

socket.on("peer", async ({ initiator }) => {

  document.getElementById("status").innerText =
    "connecting...";

  document.getElementById("label-remote").innerText =
    "#" + (myUserNumber === 1 ? 2 : 1);

  // RESTORED HYBRID CONFIG
  pc = new RTCPeerConnection({

    iceServers: [

      {
        urls: "stun:stun.l.google.com:19302"
      },

      {
        urls: [
          "turn:YOUR_VULTR_IP:3478?transport=udp",
          "turn:YOUR_VULTR_IP:3478?transport=tcp"
        ],

        username: "portal",
        credential: "portal_password"
      }
    ]
  });

  localStream.getTracks().forEach(track => {

    pc.addTrack(track, localStream);

  });

  // stabilize bitrate
  pc.getSenders().forEach(sender => {

    if (
      sender.track &&
      sender.track.kind === "video"
    ) {

      const params = sender.getParameters();

      if (!params.encodings) {
        params.encodings = [{}];
      }

      params.encodings[0].maxBitrate = 500000;

      sender.setParameters(params);
    }
  });

  pc.ontrack = (event) => {

    document.getElementById("remote").srcObject =
      event.streams[0];

    document.getElementById("status").innerText =
      "#" + currentCode + " - #" + myUserNumber;

    document.body.classList.add("connected");
  };

  pc.onicecandidate = (event) => {

    if (event.candidate) {

      socket.emit("signal", {
        code: currentCode,
        data: event.candidate
      });
    }
  };

  // auto refresh if connection dies
  pc.onconnectionstatechange = () => {

    if (
      pc.connectionState === "disconnected" ||
      pc.connectionState === "failed" ||
      pc.connectionState === "closed"
    ) {
      location.reload();
    }
  };

  if (initiator) {

    const offer =
      await pc.createOffer();

    await pc.setLocalDescription(offer);

    socket.emit("signal", {
      code: currentCode,
      data: offer
    });
  }
});

socket.on("signal", async (data) => {

  if (!pc) return;

  if (data.type === "offer") {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

    const answer =
      await pc.createAnswer();

    await pc.setLocalDescription(answer);

    socket.emit("signal", {
      code: currentCode,
      data: answer
    });

  } else if (data.type === "answer") {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

  } else {

    try {

      await pc.addIceCandidate(
        new RTCIceCandidate(data)
      );

    } catch {}
  }
});

// refresh if peer leaves
socket.on("peer_left", () => {

  location.reload();

});

// enter key support
document.getElementById("code")
.addEventListener("keydown", (e) => {

  if (e.key === "Enter") {
    join();
  }
});

window.onload = () => {

  document.getElementById("code").focus();

};

</script>

</body>
</html>
