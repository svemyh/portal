<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>portal</title>

<style>

* {
  font-family: "Courier New", Courier, monospace;
  box-sizing: border-box;
}

body {
  margin: 0;
  background: black;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
  min-height: 100dvh;

  overflow: hidden;

  touch-action: none;
}

#container {
  text-align: center;
}

#title {
  position: absolute;

  top: 20px;
  left: 50%;

  transform: translateX(-50%);

  font-size: 14px;
  letter-spacing: 1px;

  z-index: 1001;
}

#title span {
  font-size: 11px;
  opacity: 0.6;
}

video {
  width: 40vw;
  max-width: 400px;

  margin: 10px;

  background: black;
}

input {
  background: black;
  color: white;

  border: 1px solid white;

  padding: 10px;
}

button {
  margin-left: 10px;

  padding: 10px;

  background: white;
  color: black;

  border: none;

  cursor: pointer;
}

#status {
  position: relative;
  z-index: 1001;

  margin: 10px 0;
}

/* CONNECTED STATE */

.connected #local,
.connected #label-local,
.connected #label-remote {
  display: none;
}

.connected #remote {

  position: fixed;

  top: 50%;
  left: 50%;

  width: 575px;
  height: 575px;

  max-width: 95vw;
  max-height: 95vw;

  transform:
    translate(-50%, -50%)
    translate(0px, 0px)
    scale(1);

  transform-origin: center center;

  object-fit: cover;

  background: black;

  z-index: 999;

  cursor: grab;

  touch-action: none;

  border: 1px solid rgba(255,255,255,0.08);
}

/* MOBILE */

@media (max-width: 700px) {

  .connected #remote {

    width: 575px;
    height: 575px;

    max-width: 90vw;
    max-height: 90vw;
  }
}

</style>
</head>

<body>

<div id="container">

  <div id="title">
    portal<br>
    <span>v0.0.2</span>
  </div>

  <div id="entry">

    <input
      id="code"
      placeholder="enter code" />

    <button onclick="join()">
      enter
    </button>

  </div>

  <div id="stage" style="display:none;">

    <div id="label-local">#?</div>

    <video
      id="local"
      autoplay
      muted
      playsinline>
    </video>

    <div id="status">
      waiting...
    </div>

    <div id="label-remote">#?</div>

    <video
      id="remote"
      autoplay
      playsinline>
    </video>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let localStream;
let pc;
let currentCode;
let myUserNumber = null;

/* ---------- SHARED TRANSFORM STATE ---------- */

let scale = 1;
let posX = 0;
let posY = 0;

/* ---------- JOIN ---------- */

async function join() {

  const code =
    document.getElementById("code")
    .value
    .trim();

  if (!code) return;

  currentCode = code;

  localStream =
    await navigator.mediaDevices.getUserMedia({

      video: {
        width: { ideal: 640 },
        height: { ideal: 480 },
        frameRate: { ideal: 24, max: 30 }
      },

      audio: true
    });

  document.getElementById("local").srcObject =
    localStream;

  document.getElementById("entry").style.display =
    "none";

  document.getElementById("stage").style.display =
    "block";

  document.getElementById("status").innerText =
    "waiting...";

  socket.emit("join", code);
}

/* ---------- USER ASSIGNMENT ---------- */

socket.on("assigned", ({ userNumber }) => {

  myUserNumber = userNumber;

  document.getElementById("label-local").innerText =
    "#" + userNumber;
});

/* ---------- ROOM FULL ---------- */

socket.on("full", () => {

  alert("room full");

  location.reload();
});

/* ---------- TRANSFORM ---------- */

function updateTransform(
  broadcast = true
) {

  const remoteVideo =
    document.getElementById("remote");

  remoteVideo.style.transform = `
    translate(-50%, -50%)
    translate(${posX}px, ${posY}px)
    scale(${scale})
  `;

  if (broadcast && currentCode) {

    socket.emit("transform", {
      code: currentCode,
      posX,
      posY,
      scale
    });
  }
}

/* ---------- RECEIVE TRANSFORM ---------- */

socket.on("transform", (data) => {

  posX = data.posX;
  posY = data.posY;
  scale = data.scale;

  updateTransform(false);
});

/* ---------- PEER CONNECT ---------- */

socket.on("peer", async ({ initiator }) => {

  document.getElementById("status").innerText =
    "connecting...";

  document.getElementById("label-remote").innerText =
    "#" + (
      myUserNumber === 1 ? 2 : 1
    );

  pc = new RTCPeerConnection({

    iceServers: [

      {
        urls:
          "stun:stun.l.google.com:19302"
      },

      {
        urls: [
          "turn:YOUR_REAL_VULTR_IP:3478?transport=udp",
          "turn:YOUR_REAL_VULTR_IP:3478?transport=tcp"
        ],

        username: "portal",
        credential: "portal_password"
      }
    ]
  });

  localStream.getTracks().forEach(track => {

    pc.addTrack(
      track,
      localStream
    );
  });

  /* ---------- BITRATE ---------- */

  pc.getSenders().forEach(sender => {

    if (
      sender.track &&
      sender.track.kind === "video"
    ) {

      const params =
        sender.getParameters();

      if (!params.encodings) {
        params.encodings = [{}];
      }

      params.encodings[0].maxBitrate =
        500000;

      sender.setParameters(params);
    }
  });

  /* ---------- REMOTE STREAM ---------- */

  pc.ontrack = (event) => {

    const remoteVideo =
      document.getElementById("remote");

    remoteVideo.srcObject =
      event.streams[0];

    remoteVideo.onloadedmetadata =
      async () => {

      try {

        await remoteVideo.play();

        document.getElementById(
          "status"
        ).innerText =
          "#" +
          currentCode +
          " - #" +
          myUserNumber;

        document.body.classList.add(
          "connected"
        );

      } catch (err) {

        console.error(err);
      }
    };
  };

  /* ---------- ICE ---------- */

  pc.onicecandidate = (event) => {

    if (event.candidate) {

      socket.emit("signal", {

        code: currentCode,

        data: event.candidate
      });
    }
  };

  /* ---------- CONNECTION ---------- */

  pc.onconnectionstatechange = () => {

    if (
      pc.connectionState ===
        "disconnected" ||

      pc.connectionState ===
        "failed" ||

      pc.connectionState ===
        "closed"
    ) {

      location.reload();
    }
  };

  /* ---------- OFFER ---------- */

  if (initiator) {

    const offer =
      await pc.createOffer();

    await pc.setLocalDescription(
      offer
    );

    socket.emit("signal", {

      code: currentCode,

      data: offer
    });
  }
});

/* ---------- SIGNALING ---------- */

socket.on("signal", async (data) => {

  if (!pc) return;

  if (data.type === "offer") {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

    const answer =
      await pc.createAnswer();

    await pc.setLocalDescription(
      answer
    );

    socket.emit("signal", {

      code: currentCode,

      data: answer
    });

  } else if (
    data.type === "answer"
  ) {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

  } else {

    try {

      await pc.addIceCandidate(
        new RTCIceCandidate(data)
      );

    } catch {}
  }
});

/* ---------- PEER LEFT ---------- */

socket.on("peer_left", () => {

  location.reload();

});

/* ---------- ENTER KEY ---------- */

document
.getElementById("code")
.addEventListener("keydown", (e) => {

  if (e.key === "Enter") {

    join();
  }
});

/* ---------- REMOTE VIDEO ---------- */

const remoteVideo =
  document.getElementById("remote");

/* ---------- DRAG ---------- */

let startX = 0;
let startY = 0;

let isDragging = false;

remoteVideo.addEventListener(
  "mousedown",
  (e) => {

    isDragging = true;

    startX = e.clientX - posX;
    startY = e.clientY - posY;

    remoteVideo.style.cursor =
      "grabbing";
  }
);

window.addEventListener(
  "mousemove",
  (e) => {

    if (!isDragging) return;

    posX = e.clientX - startX;
    posY = e.clientY - startY;

    updateTransform();
  }
);

window.addEventListener(
  "mouseup",
  () => {

    isDragging = false;

    remoteVideo.style.cursor =
      "grab";
  }
);

/* ---------- DESKTOP ZOOM ---------- */

remoteVideo.addEventListener(
  "wheel",
  (e) => {

    e.preventDefault();

    scale += e.deltaY * -0.001;

    scale = Math.min(
      Math.max(1, scale),
      4
    );

    updateTransform();

  },
  { passive: false }
);

/* ---------- MOBILE PINCH ---------- */

let initialDistance = null;

remoteVideo.addEventListener(
  "touchmove",
  (e) => {

    if (e.touches.length === 2) {

      e.preventDefault();

      const dx =
        e.touches[0].clientX -
        e.touches[1].clientX;

      const dy =
        e.touches[0].clientY -
        e.touches[1].clientY;

      const distance =
        Math.sqrt(dx * dx + dy * dy);

      if (!initialDistance) {

        initialDistance =
          distance;
      }

      scale *=
        distance /
        initialDistance;

      scale = Math.min(
        Math.max(1, scale),
        4
      );

      initialDistance =
        distance;

      updateTransform();
    }

  },
  { passive: false }
);

remoteVideo.addEventListener(
  "touchend",
  () => {

    initialDistance = null;
  }
);

/* ---------- MOBILE DRAG ---------- */

let touchStartX = 0;
let touchStartY = 0;

remoteVideo.addEventListener(
  "touchstart",
  (e) => {

    if (e.touches.length === 1) {

      touchStartX =
        e.touches[0].clientX -
        posX;

      touchStartY =
        e.touches[0].clientY -
        posY;
    }

  },
  { passive: false }
);

remoteVideo.addEventListener(
  "touchmove",
  (e) => {

    if (e.touches.length === 1) {

      posX =
        e.touches[0].clientX -
        touchStartX;

      posY =
        e.touches[0].clientY -
        touchStartY;

      updateTransform();
    }

  },
  { passive: false }
);

/* ---------- DOUBLE TAP ---------- */

let lastTap = 0;

remoteVideo.addEventListener(
  "touchend",
  async () => {

    const now = Date.now();

    if (now - lastTap < 300) {

      if (
        !document.fullscreenElement
      ) {

        try {

          await remoteVideo
          .requestFullscreen();

        } catch {}

      } else {

        document.exitFullscreen();
      }
    }

    lastTap = now;
  }
);

/* ---------- FOCUS ---------- */

window.onload = () => {

  document
  .getElementById("code")
  .focus();
};

</script>

</body>
</html>
