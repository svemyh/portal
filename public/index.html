<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>portal</title>

<style>

* {
  font-family: "Courier New", Courier, monospace;
}

body {
  margin: 0;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#container {
  text-align: center;
}

#title {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
}

#title span {
  font-size: 11px;
  opacity: 0.6;
}

video {
  width: 40vw;
  max-width: 400px;
  margin: 10px;
  background: black;
}

input {
  background: black;
  color: white;
  border: 1px solid white;
  padding: 10px;
}

button {
  margin-left: 10px;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}

#status {
  margin: 10px 0;
}

.connected #local,
.connected #label-local,
.connected #label-remote {
  display: none;
}

.connected #remote {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 100vw;
  height: 100vh;
  transform: translate(-50%, -50%);
  object-fit: cover;
  background: black;
}

</style>
</head>

<body>

<div id="container">

  <div id="title">
    portal<br>
    <span>v0.0.2 TURN TEST</span>
  </div>

  <div id="entry">
    <input id="code" placeholder="enter code" />
    <button onclick="join()">enter</button>
  </div>

  <div id="stage" style="display:none;">

    <div id="label-local">#?</div>

    <video id="local" autoplay muted playsinline></video>

    <div id="status">waiting...</div>

    <div id="label-remote">#?</div>

    <video id="remote" autoplay playsinline></video>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let localStream;
let pc;
let currentCode;
let myUserNumber = null;

async function join() {

  const code =
    document.getElementById("code")
    .value
    .trim();

  if (!code) return;

  currentCode = code;

  localStream =
    await navigator.mediaDevices.getUserMedia({

      video: {
        width: { ideal: 640 },
        height: { ideal: 480 },
        frameRate: { ideal: 24, max: 30 }
      },

      audio: true
    });

  document.getElementById("local").srcObject =
    localStream;

  document.getElementById("entry").style.display =
    "none";

  document.getElementById("stage").style.display =
    "block";

  socket.emit("join", code);
}

socket.on("assigned", ({ userNumber }) => {

  myUserNumber = userNumber;

  document.getElementById("label-local").innerText =
    "#" + userNumber;
});

socket.on("peer", async ({ initiator }) => {

  document.getElementById("status").innerText =
    "testing TURN relay...";

  document.getElementById("label-remote").innerText =
    "#" + (myUserNumber === 1 ? 2 : 1);

  pc = new RTCPeerConnection({

    iceTransportPolicy: "relay",

    iceServers: [

      {
        urls: [
          "turn:45.63.22.171:3478?transport=udp",
          "turn:45.63.22.171:3478?transport=tcp"
        ],

        username: "portal",
        credential: "portal_password"
      }
    ]
  });

  localStream.getTracks().forEach(track => {

    pc.addTrack(track, localStream);

  });

  pc.ontrack = (event) => {

    const remoteVideo =
      document.getElementById("remote");

    remoteVideo.srcObject =
      event.streams[0];

    remoteVideo.onloadedmetadata = async () => {

      try {

        await remoteVideo.play();

        document.getElementById("status").innerText =
          "TURN relay connected";

        document.body.classList.add("connected");

      } catch (err) {

        console.error(err);

      }
    };
  };

  pc.onicecandidate = (event) => {

    if (event.candidate) {

      socket.emit("signal", {
        code: currentCode,
        data: event.candidate
      });
    }
  };

  pc.onconnectionstatechange = () => {

    console.log(pc.connectionState);

    if (
      pc.connectionState === "disconnected" ||
      pc.connectionState === "failed" ||
      pc.connectionState === "closed"
    ) {

      location.reload();
    }
  };

  if (initiator) {

    const offer =
      await pc.createOffer();

    await pc.setLocalDescription(offer);

    socket.emit("signal", {
      code: currentCode,
      data: offer
    });
  }
});

socket.on("signal", async (data) => {

  if (!pc) return;

  if (data.type === "offer") {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

    const answer =
      await pc.createAnswer();

    await pc.setLocalDescription(answer);

    socket.emit("signal", {
      code: currentCode,
      data: answer
    });

  } else if (data.type === "answer") {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

  } else {

    try {

      await pc.addIceCandidate(
        new RTCIceCandidate(data)
      );

    } catch {}
  }
});

socket.on("peer_left", () => {

  location.reload();

});

document.getElementById("code")
.addEventListener("keydown", (e) => {

  if (e.key === "Enter") {
    join();
  }
});

window.onload = () => {

  document.getElementById("code").focus();

};

</script>

</body>
</html>
