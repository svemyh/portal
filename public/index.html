<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>portal</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<style>
* { font-family: "Courier New", Courier, monospace; }

body {
  margin: 0;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#container { text-align: center; }

#title {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  letter-spacing: 1px;
}

#title span {
  font-size: 11px;
  opacity: 0.6;
}

video {
  width: 40vw;
  max-width: 400px;
  margin: 10px;
  background: black;
}

input {
  background: black;
  color: white;
  border: 1px solid white;
  padding: 10px;
}

button {
  margin-left: 10px;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}

#similarity {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div id="container">

  <div id="title">
    portal<br>
    <span>v0.0.2</span>
  </div>

  <div id="entry">
    <input id="code" placeholder="enter code" />
    <button onclick="join()">enter</button>
  </div>

  <div id="stage" style="display:none;">
    <video id="local" autoplay muted playsinline></video>
    <video id="remote" autoplay playsinline></video>
    <div id="similarity"></div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let localStream;
let pc;
let currentCode;

let myDescriptor = null;

// ---------- JOIN ----------
async function join() {
  const code = document.getElementById("code").value.trim();
  if (!code) return;

  currentCode = code;

  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  const localVideo = document.getElementById("local");
  localVideo.srcObject = localStream;

  document.getElementById("entry").style.display = "none";
  document.getElementById("stage").style.display = "block";

  await loadModels();

  setTimeout(async () => {
    myDescriptor = await getEmbedding(localVideo);
  }, 1200);

  socket.emit("join", code);
}

// ---------- SOCKET ----------
socket.on("peer", async ({ initiator }) => {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream);
  });

  pc.ontrack = (event) => {
    const remoteVideo = document.getElementById("remote");
    remoteVideo.srcObject = event.streams[0];

    setInterval(compareLoop, 1500);
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("signal", { code: currentCode, data: event.candidate });
    }
  };

  if (initiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal", { code: currentCode, data: offer });
  }
});

socket.on("signal", async (data) => {
  if (!pc) return;

  if (data.type === "offer") {
    await pc.setRemoteDescription(new RTCSessionDescription(data));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit("signal", { code: currentCode, data: answer });
  } else if (data.type === "answer") {
    await pc.setRemoteDescription(new RTCSessionDescription(data));
  } else {
    try {
      await pc.addIceCandidate(new RTCIceCandidate(data));
    } catch {}
  }
});

// ---------- FACE ----------
async function loadModels() {
  await faceapi.nets.tinyFaceDetector.loadFromUri("/models");
  await faceapi.nets.faceRecognitionNet.loadFromUri("/models");
}

async function getEmbedding(video) {
  const result = await faceapi
    .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks()
    .withFaceDescriptor();

  return result ? result.descriptor : null;
}

// calibrated similarity (important)
function calibratedSimilarity(a, b) {
  if (!a || !b) return null;

  const distance = faceapi.euclideanDistance(a, b);

  // normalization window (empirically stable)
  const min = 0.35;
  const max = 0.85;

  let norm = (distance - min) / (max - min);
  norm = Math.max(0, Math.min(1, norm));

  return (1 - norm).toFixed(3);
}

async function compareLoop() {
  const remoteVideo = document.getElementById("remote");

  const other = await getEmbedding(remoteVideo);
  const sim = calibratedSimilarity(myDescriptor, other);

  if (sim) {
    document.getElementById("similarity").innerText = sim;
  }
}

// ---------- UX ----------
document.getElementById("code").addEventListener("keydown", (e) => {
  if (e.key === "Enter") join();
});

window.onload = () => {
  document.getElementById("code").focus();
};
</script>

</body>
</html>
