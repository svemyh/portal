<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>portal</title>

<style>

* {
  font-family: "Courier New", monospace;
  box-sizing: border-box;
}

body {

  margin: 0;

  background: black;
  color: white;

  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
}

#title {

  position: fixed;

  top: 18px;
  left: 50%;

  transform: translateX(-50%);

  z-index: 9000;

  text-align: center;

  font-size: 14px;
}

#title span {

  font-size: 11px;
  opacity: 0.6;
}

#entry {

  position: relative;
  z-index: 5000;
}

input {

  background: black;
  color: white;

  border: 1px solid white;

  padding: 10px;
}

button {

  padding: 10px;

  background: white;
  color: black;

  border: none;

  margin-left: 10px;

  cursor: pointer;
}

#status {

  position: fixed;

  top: 55px;
  left: 50%;

  transform: translateX(-50%);

  z-index: 5000;

  font-size: 12px;
}

/* ---------- VIDEO ---------- */

#remote {

  position: fixed;

  top: 50%;
  left: 50%;

  width: 575px;
  height: 575px;

  max-width: 92vw;
  max-height: 92vw;

  object-fit: cover;

  background: black;

  transform:
    translate(-50%, -50%)
    translate(0px,0px)
    scale(1);

  transform-origin: center center;

  border: 1px solid rgba(255,255,255,0.08);

  z-index: 1000;

  touch-action: none;

  cursor: grab;
}

#local {

  position: fixed;

  width: 1px;
  height: 1px;

  opacity: 0;

  pointer-events: none;
}

/* ---------- FILE BOX ---------- */

#fileBox {

  position: fixed;

  width: 240px;
  height: 240px;

  right: 25px;
  bottom: 25px;

  background: rgba(0,0,0,0.95);

  border: 1px solid rgba(255,255,255,0.15);

  z-index: 3000;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;

  font-size: 12px;
  letter-spacing: 1px;

  cursor: grab;

  user-select: none;

  touch-action: none;

  transform:
    translate(0px,0px)
    scale(1);
}

#fileBox.dragging {

  border-color: white;
}

#fileProgress {

  width: 80%;
  height: 1px;

  background: rgba(255,255,255,0.15);

  margin-top: 14px;

  display: none;
}

#fileProgressBar {

  height: 100%;
  width: 0%;

  background: white;

  transition: width 0.1s linear;
}

#fileLabel {

  margin-top: 10px;
  font-size: 10px;
  letter-spacing: 1px;
  opacity: 0.5;
}

/* ---------- OVERLAYS ---------- */

.overlay {

  position: fixed;

  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);

  font-size: 16px;
  letter-spacing: 2px;

  z-index: 10000;

  opacity: 0;

  pointer-events: none;

  transition: opacity 0.2s ease;
}

</style>
</head>

<body>

<div id="title">
  portal<br>
  <span>v0.0.6</span>
</div>

<div id="status">
  idle
</div>

<div id="entry">

  <input
    id="code"
    placeholder="enter code">

  <button onclick="join()">
    enter
  </button>

</div>

<video
  id="local"
  autoplay
  muted
  playsinline>
</video>

<video
  id="remote"
  autoplay
  playsinline>
</video>

<input
  type="file"
  id="filePicker"
  style="display:none">

<div id="fileBox">
  <span id="fileText">DROP FILE</span>
  <div id="fileProgress">
    <div id="fileProgressBar"></div>
  </div>
  <div id="fileLabel"></div>
</div>

<div
  id="overlay"
  class="overlay">
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let pc;
let dataChannel;
let receiveChannel;

let localStream;
let currentCode;

/* ---------- VIDEO STATE ---------- */

let videoX = 0;
let videoY = 0;
let videoScale = 1;

/* ---------- FILE STATE ---------- */

let fileX = 0;
let fileY = 0;
let fileScale = 1;

/* ---------- ELEMENTS ---------- */

const remoteVideo =
  document.getElementById("remote");

const fileBox =
  document.getElementById("fileBox");

const overlay =
  document.getElementById("overlay");

/* ---------- OVERLAY ---------- */

function flash(text) {

  overlay.innerText = text;

  overlay.style.opacity = "1";

  clearTimeout(overlay.timeout);

  overlay.timeout = setTimeout(() => {

    overlay.style.opacity = "0";

  }, 900);
}

/* ---------- MAKE DRAGGABLE ---------- */

function makeDraggable(el, state) {

  let dragging = false;
  let moved = false;
  let startX = 0;
  let startY = 0;

  el.addEventListener("mousedown", (e) => {

    dragging = true;
    moved = false;
    startX = e.clientX - state.x;
    startY = e.clientY - state.y;

    e.stopPropagation();
  });

  window.addEventListener("mousemove", (e) => {

    if (!dragging) return;

    const nx = e.clientX - startX;
    const ny = e.clientY - startY;

    if (
      Math.abs(nx - state.x) > 3 ||
      Math.abs(ny - state.y) > 3
    ) {
      moved = true;
    }

    state.x = nx;
    state.y = ny;

    state.update();
  });

  window.addEventListener("mouseup", () => {

    dragging = false;
  });

  el.addEventListener("touchstart", (e) => {

    const t = e.touches[0];
    dragging = true;
    moved = false;
    startX = t.clientX - state.x;
    startY = t.clientY - state.y;

    e.stopPropagation();
  }, { passive: true });

  window.addEventListener("touchmove", (e) => {

    if (!dragging) return;

    const t = e.touches[0];
    const nx = t.clientX - startX;
    const ny = t.clientY - startY;

    if (
      Math.abs(nx - state.x) > 3 ||
      Math.abs(ny - state.y) > 3
    ) {
      moved = true;
    }

    state.x = nx;
    state.y = ny;

    state.update();
  }, { passive: true });

  window.addEventListener("touchend", () => {

    dragging = false;
  });

  /* expose moved flag so click handlers can check it */
  state.wasMoved = () => moved;
}

/* ---------- JOIN ---------- */

async function join() {

  const code =
    document.getElementById("code")
    .value
    .trim();

  if (!code) return;

  currentCode = code;

  localStream =
    await navigator.mediaDevices.getUserMedia({

      video: true,
      audio: true
    });

  document
  .getElementById("local")
  .srcObject = localStream;

  socket.emit("join", code);

  document
  .getElementById("entry")
  .style.display = "none";

  document
  .getElementById("status")
  .innerText = "waiting...";
}

/* ---------- PEER ---------- */

socket.on("peer", async ({ initiator }) => {

  pc = new RTCPeerConnection({

    iceServers: [

      {
        urls:
          "stun:stun.l.google.com:19302"
      },

      {
        urls: [
          "turn:YOUR_VULTR_IP:3478?transport=udp",
          "turn:YOUR_VULTR_IP:3478?transport=tcp"
        ],

        username: "portal",
        credential: "portal_password"
      }
    ]
  });

  /* ---------- FILE CHANNEL ---------- */

  if (initiator) {

    dataChannel =
      pc.createDataChannel("files", {

        ordered: true
      });

    setupDataChannel(dataChannel);
  }

  pc.ondatachannel = (event) => {

    receiveChannel = event.channel;

    setupDataChannel(receiveChannel);
  };

  localStream.getTracks().forEach(track => {

    pc.addTrack(
      track,
      localStream
    );
  });

  pc.ontrack = (event) => {

    remoteVideo.srcObject =
      event.streams[0];

    document
    .getElementById("status")
    .innerText = "connected";
  };

  pc.onicecandidate = (event) => {

    if (event.candidate) {

      socket.emit("signal", {

        code: currentCode,

        data: event.candidate
      });
    }
  };

  if (initiator) {

    const offer =
      await pc.createOffer();

    await pc.setLocalDescription(
      offer
    );

    socket.emit("signal", {

      code: currentCode,

      data: offer
    });
  }
});

/* ---------- SIGNAL ---------- */

socket.on("signal", async (data) => {

  if (!pc) return;

  if (data.type === "offer") {

    await pc.setRemoteDescription(data);

    const answer =
      await pc.createAnswer();

    await pc.setLocalDescription(
      answer
    );

    socket.emit("signal", {

      code: currentCode,

      data: answer
    });

  } else if (
    data.type === "answer"
  ) {

    await pc.setRemoteDescription(data);

  } else {

    try {

      await pc.addIceCandidate(data);

    } catch {}
  }
});

/* ---------- ROOM FULL ---------- */

socket.on("full", () => {

  document
  .getElementById("status")
  .innerText = "room full";

  document
  .getElementById("entry")
  .style.display = "";

  if (localStream) {
    localStream.getTracks()
      .forEach(t => t.stop());
    localStream = null;
  }
});

/* ---------- PEER LEFT ---------- */

socket.on("peer_left", () => {

  document
  .getElementById("status")
  .innerText = "peer disconnected";

  if (pc) {
    pc.close();
    pc = null;
  }

  remoteVideo.srcObject = null;
  dataChannel = null;
  receiveChannel = null;
});

/* ---------- TRANSFORMS ---------- */

function updateVideoTransform() {

  remoteVideo.style.transform = `
    translate(-50%, -50%)
    translate(${videoX}px, ${videoY}px)
    scale(${videoScale})
  `;
}

function updateFileTransform() {

  fileBox.style.transform = `
    translate(${fileX}px, ${fileY}px)
    scale(${fileScale})
  `;
}

/* ---------- INIT DRAG ---------- */

makeDraggable(remoteVideo, {
  get x() { return videoX; },
  set x(v) { videoX = v; },
  get y() { return videoY; },
  set y(v) { videoY = v; },
  update: updateVideoTransform
});

const fileBoxState = {
  get x() { return fileX; },
  set x(v) { fileX = v; },
  get y() { return fileY; },
  set y(v) { fileY = v; },
  update: updateFileTransform
};

makeDraggable(fileBox, fileBoxState);

/* ---------- WHEEL ---------- */

window.addEventListener(
  "wheel",
  (e) => {

    e.preventDefault();

    const overFile =
      e.target === fileBox ||
      fileBox.contains(e.target);

    if (overFile) {

      fileScale +=
        e.deltaY * -0.001;

      fileScale =
        Math.min(
          Math.max(1, fileScale),
          4
        );

      updateFileTransform();

    } else {

      videoScale +=
        e.deltaY * -0.001;

      videoScale =
        Math.min(
          Math.max(1, videoScale),
          4
        );

      updateVideoTransform();
    }
  },
  { passive: false }
);

/* ---------- FILE UI REFS ---------- */

const fileText =
  document.getElementById("fileText");

const fileProgress =
  document.getElementById("fileProgress");

const fileProgressBar =
  document.getElementById("fileProgressBar");

const fileLabel =
  document.getElementById("fileLabel");

const filePicker =
  document.getElementById("filePicker");

/* ---------- FILE PROGRESS ---------- */

function showProgress(pct, label) {

  fileProgress.style.display = "block";
  fileProgressBar.style.width = pct + "%";
  fileLabel.innerText = label;
}

function hideProgress() {

  fileProgress.style.display = "none";
  fileProgressBar.style.width = "0%";
  fileLabel.innerText = "";
}

/* ---------- SEND FILE ---------- */

const CHUNK_SIZE = 16384;
const BUFFER_THRESHOLD = 262144;

async function sendFile(buffer, filename) {

  const channel =
    dataChannel || receiveChannel;

  if (!channel || channel.readyState !== "open") {
    flash("NOT CONNECTED");
    return;
  }

  const total = buffer.byteLength;
  let offset = 0;

  fileText.innerText = "SENDING";
  showProgress(0, filename);

  channel.send(JSON.stringify({
    type: "meta",
    filename,
    size: total
  }));

  function sendNext() {

    while (offset < total) {

      if (channel.bufferedAmount > BUFFER_THRESHOLD) {

        channel.bufferedAmountLowThreshold =
          BUFFER_THRESHOLD / 2;

        channel.onbufferedamountlow = () => {
          channel.onbufferedamountlow = null;
          sendNext();
        };

        return;
      }

      const end = Math.min(offset + CHUNK_SIZE, total);
      channel.send(buffer.slice(offset, end));
      offset = end;

      showProgress(
        Math.round((offset / total) * 100),
        filename
      );
    }

    channel.send(JSON.stringify({ type: "end" }));

    fileText.innerText = "DROP FILE";
    hideProgress();
    flash("SENT");
  }

  sendNext();
}

/* ---------- RECEIVE ---------- */

let incomingChunks = [];
let incomingName = "download";
let incomingSize = 0;
let incomingReceived = 0;

function setupDataChannel(channel) {

  channel.binaryType = "arraybuffer";

  channel.onmessage = (event) => {

    if (typeof event.data === "string") {

      const msg = JSON.parse(event.data);

      if (msg.type === "meta") {

        incomingName = msg.filename;
        incomingSize = msg.size || 0;
        incomingReceived = 0;
        incomingChunks = [];

        fileText.innerText = "RECEIVING";
        showProgress(0, msg.filename);
      }

      if (msg.type === "end") {

        const blob = new Blob(incomingChunks);
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");

        a.href = url;
        a.download = incomingName;

        /* iOS Safari requires element in DOM */
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        setTimeout(() => URL.revokeObjectURL(url), 10000);

        fileText.innerText = "DROP FILE";
        hideProgress();
        flash("RECEIVED");
      }

    } else {

      incomingChunks.push(event.data);
      incomingReceived += event.data.byteLength;

      if (incomingSize > 0) {

        showProgress(
          Math.round((incomingReceived / incomingSize) * 100),
          incomingName
        );
      }
    }
  };
}

/* ---------- FILE DROP ---------- */

fileBox.addEventListener("dragover", (e) => {

  e.preventDefault();
  fileBox.classList.add("dragging");
});

fileBox.addEventListener("dragleave", () => {

  fileBox.classList.remove("dragging");
});

fileBox.addEventListener("drop", async (e) => {

  e.preventDefault();
  fileBox.classList.remove("dragging");

  const file = e.dataTransfer.files[0];
  if (!file) return;

  const buffer = await file.arrayBuffer();
  sendFile(buffer, file.name);
});

/* ---------- MOBILE TAP TO PICK ---------- */

fileBox.addEventListener("click", () => {

  /* don't open picker if the user was dragging the box */
  if (fileBoxState.wasMoved && fileBoxState.wasMoved()) return;

  filePicker.click();
});

filePicker.addEventListener("change", async () => {

  const file = filePicker.files[0];
  if (!file) return;

  filePicker.value = "";

  const buffer = await file.arrayBuffer();
  sendFile(buffer, file.name);
});

/* ---------- ENTER ---------- */

document
.getElementById("code")
.addEventListener(
  "keydown",
  (e) => {

    if (e.key === "Enter") {

      join();
    }
  }
);

</script>

</body>
</html>
