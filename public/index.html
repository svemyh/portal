<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>portal</title>

<style>

* {
  font-family: "Courier New", Courier, monospace;
  box-sizing: border-box;
}

body {
  margin: 0;
  background: black;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
  min-height: 100dvh;

  overflow: hidden;

  touch-action: none;
}

#container {
  text-align: center;
}

#title {
  position: absolute;

  top: 20px;
  left: 50%;

  transform: translateX(-50%);

  font-size: 14px;
  letter-spacing: 1px;

  z-index: 1001;
}

#title span {
  font-size: 11px;
  opacity: 0.6;
}

video {
  width: 40vw;
  max-width: 400px;

  margin: 10px;

  background: black;
}

input {
  background: black;
  color: white;

  border: 1px solid white;

  padding: 10px;
}

button {
  margin-left: 10px;

  padding: 10px;

  background: white;
  color: black;

  border: none;

  cursor: pointer;
}

#status {
  position: relative;
  z-index: 1001;

  margin: 10px 0;
}

#modeFlash,
#aiFlash {

  position: fixed;

  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);

  font-size: 16px;
  letter-spacing: 2px;

  opacity: 0;

  pointer-events: none;

  z-index: 6000;

  transition: opacity 0.2s ease;
}

/* KEEP LOCAL VIDEO ACTIVE FOR FACE API */

.connected #local {

  position: fixed;

  width: 1px;
  height: 1px;

  opacity: 0;

  pointer-events: none;
}

.connected #label-local,
.connected #label-remote {
  display: none;
}

.connected #remote {

  position: fixed;

  top: 50%;
  left: 50%;

  width: 575px;
  height: 575px;

  max-width: 95vw;
  max-height: 95vw;

  transform:
    translate(-50%, -50%)
    translate(0px, 0px)
    scale(1);

  transform-origin: center center;

  object-fit: cover;

  background: black;

  z-index: 999;

  cursor: grab;

  touch-action: none;

  border: 1px solid rgba(255,255,255,0.08);
}

/* FACE OVERLAY */

#faceOverlay {

  position: fixed;

  top: 50%;
  left: 50%;

  width: 575px;
  height: 575px;

  transform: translate(-50%, -50%);

  pointer-events: none;

  z-index: 5000;
}

@media (max-width: 700px) {

  .connected #remote,
  #faceOverlay {

    width: 575px;
    height: 575px;

    max-width: 90vw;
    max-height: 90vw;
  }
}

</style>
</head>

<body>

<div id="modeFlash"></div>
<div id="aiFlash"></div>

<div id="container">

  <div id="title">
    portal<br>
    <span>v0.0.5</span>
  </div>

  <div id="entry">

    <input
      id="code"
      placeholder="enter code" />

    <button onclick="join()">
      enter
    </button>

  </div>

  <div id="stage" style="display:none;">

    <div id="label-local">#?</div>

    <video
      id="local"
      autoplay
      muted
      playsinline>
    </video>

    <div id="status">
      waiting...
    </div>

    <div id="label-remote">#?</div>

    <video
      id="remote"
      autoplay
      playsinline>
    </video>

  </div>

</div>

<canvas id="faceOverlay"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<script>

const socket = io();

let localStream;
let pc;
let currentCode;
let myUserNumber = null;

/* ---------- CONTROL MODE ---------- */

let controlMode = "local";

/* ---------- AI MODE ---------- */

let aiMode = false;

/* ---------- TRANSFORM STATE ---------- */

let scale = 1;
let posX = 0;
let posY = 0;

/* ---------- FACE TRACKING ---------- */

let faceTrackingStarted = false;

/* ---------- JOIN ---------- */

async function join() {

  const code =
    document.getElementById("code")
    .value
    .trim();

  if (!code) return;

  currentCode = code;

  localStream =
    await navigator.mediaDevices.getUserMedia({

      video: {
        width: { ideal: 640 },
        height: { ideal: 480 },
        frameRate: { ideal: 24, max: 30 }
      },

      audio: true
    });

  document.getElementById("local").srcObject =
    localStream;

  document.getElementById("entry").style.display =
    "none";

  document.getElementById("stage").style.display =
    "block";

  document.getElementById("status").innerText =
    "waiting...";

  socket.emit("join", code);

  /* LOAD FACE API MODEL */

  await faceapi.nets.tinyFaceDetector.loadFromUri(
    "/models"
  );

  console.log("FACE API LOADED");

  startHeadTracking();
}

/* ---------- HEAD TRACKING ---------- */

function startHeadTracking() {

  if (faceTrackingStarted) return;

  faceTrackingStarted = true;

  const localVideo =
    document.getElementById("local");

  const canvas =
    document.getElementById("faceOverlay");

  const ctx =
    canvas.getContext("2d");

  setInterval(async () => {

    if (!aiMode) {

      ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      return;
    }

    if (!localVideo.videoWidth) return;

    canvas.width = 575;
    canvas.height = 575;

    try {

      const detection =
        await faceapi.detectSingleFace(
          localVideo,
          new faceapi.TinyFaceDetectorOptions({
            inputSize: 224,
            scoreThreshold: 0.5
          })
        );

      ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      if (!detection) return;

      const box =
        detection.box;

      const scaleX =
        canvas.width /
        localVideo.videoWidth;

      const scaleY =
        canvas.height /
        localVideo.videoHeight;

      const x =
        box.x * scaleX;

      const y =
        box.y * scaleY;

      const w =
        box.width * scaleX;

      const h =
        box.height * scaleY;

      /* FACE BOX */

      ctx.strokeStyle = "white";

      ctx.lineWidth = 2;

      ctx.strokeRect(
        x,
        y,
        w,
        h
      );

      /* CENTER POINT */

      ctx.fillStyle = "white";

      ctx.fillRect(
        x + w / 2 - 3,
        y + h / 2 - 3,
        6,
        6
      );

      /* HEAD CONTROL */

      const centerX =
        box.x + box.width / 2;

      const centerY =
        box.y + box.height / 2;

      const normalizedX =
        (centerX / localVideo.videoWidth) - 0.5;

      const normalizedY =
        (centerY / localVideo.videoHeight) - 0.5;

      posX =
        normalizedX * 500;

      posY =
        normalizedY * 500;

      const faceArea =
        box.width * box.height;

      const targetScale =
        Math.min(
          Math.max(
            faceArea / 50000,
            1
          ),
          2.5
        );

      scale =
        scale * 0.85 +
        targetScale * 0.15;

      updateTransform();

    } catch (err) {

      console.error(err);

    }

  }, 120);
}

/* ---------- USER ASSIGNMENT ---------- */

socket.on("assigned", ({ userNumber }) => {

  myUserNumber = userNumber;

  document.getElementById("label-local").innerText =
    "#" + userNumber;
});

/* ---------- ROOM FULL ---------- */

socket.on("full", () => {

  alert("room full");

  location.reload();
});

/* ---------- APPLY LOCAL TRANSFORM ---------- */

function applyTransform() {

  const remoteVideo =
    document.getElementById("remote");

  remoteVideo.style.transform = `
    translate(-50%, -50%)
    translate(${posX}px, ${posY}px)
    scale(${scale})
  `;
}

/* ---------- UPDATE TRANSFORM ---------- */

function updateTransform() {

  if (controlMode === "local") {

    applyTransform();

  } else {

    socket.emit("transform", {

      code: currentCode,

      posX,
      posY,
      scale
    });
  }
}

/* ---------- RECEIVE REMOTE CONTROL ---------- */

socket.on("transform", (data) => {

  const remoteVideo =
    document.getElementById("remote");

  remoteVideo.style.transform = `
    translate(-50%, -50%)
    translate(${data.posX}px, ${data.posY}px)
    scale(${data.scale})
  `;
});

/* ---------- MODE FLASH ---------- */

function flashMode() {

  const flash =
    document.getElementById("modeFlash");

  flash.innerText =
    controlMode.toUpperCase();

  flash.style.opacity = "1";

  clearTimeout(flash.timeout);

  flash.timeout = setTimeout(() => {

    flash.style.opacity = "0";

  }, 800);
}

/* ---------- AI FLASH ---------- */

function flashAI() {

  const flash =
    document.getElementById("aiFlash");

  flash.innerText =
    aiMode
      ? "AI ON"
      : "AI OFF";

  flash.style.opacity = "1";

  clearTimeout(flash.timeout);

  flash.timeout = setTimeout(() => {

    flash.style.opacity = "0";

  }, 800);
}

/* ---------- TOGGLE MODE ---------- */

function toggleMode() {

  controlMode =
    controlMode === "local"
      ? "remote"
      : "local";

  flashMode();
}

/* ---------- TOGGLE AI ---------- */

function toggleAI() {

  aiMode = !aiMode;

  flashAI();

  console.log(
    "AI MODE:",
    aiMode
  );
}

/* ---------- PEER CONNECT ---------- */

socket.on("peer", async ({ initiator }) => {

  document.getElementById("status").innerText =
    "connecting...";

  document.getElementById("label-remote").innerText =
    "#" + (
      myUserNumber === 1 ? 2 : 1
    );

  pc = new RTCPeerConnection({

    iceServers: [

      {
        urls:
          "stun:stun.l.google.com:19302"
      },

      {
        urls: [
          "turn:YOUR_REAL_VULTR_IP:3478?transport=udp",
          "turn:YOUR_REAL_VULTR_IP:3478?transport=tcp"
        ],

        username: "portal",
        credential: "portal_password"
      }
    ]
  });

  localStream.getTracks().forEach(track => {

    pc.addTrack(
      track,
      localStream
    );
  });

  pc.getSenders().forEach(sender => {

    if (
      sender.track &&
      sender.track.kind === "video"
    ) {

      const params =
        sender.getParameters();

      if (!params.encodings) {
        params.encodings = [{}];
      }

      params.encodings[0].maxBitrate =
        500000;

      sender.setParameters(params);
    }
  });

  /* ---------- REMOTE STREAM ---------- */

  pc.ontrack = (event) => {

    const remoteVideo =
      document.getElementById("remote");

    remoteVideo.srcObject =
      event.streams[0];

    remoteVideo.onloadedmetadata =
      async () => {

      try {

        await remoteVideo.play();

        document.getElementById(
          "status"
        ).innerText =
          "#" +
          currentCode +
          " - #" +
          myUserNumber;

        document.body.classList.add(
          "connected"
        );

      } catch (err) {

        console.error(err);
      }
    };
  };

  /* ---------- ICE ---------- */

  pc.onicecandidate = (event) => {

    if (event.candidate) {

      socket.emit("signal", {

        code: currentCode,

        data: event.candidate
      });
    }
  };

  /* ---------- CONNECTION ---------- */

  pc.onconnectionstatechange = () => {

    if (
      pc.connectionState ===
        "disconnected" ||

      pc.connectionState ===
        "failed" ||

      pc.connectionState ===
        "closed"
    ) {

      location.reload();
    }
  };

  /* ---------- OFFER ---------- */

  if (initiator) {

    const offer =
      await pc.createOffer();

    await pc.setLocalDescription(
      offer
    );

    socket.emit("signal", {

      code: currentCode,

      data: offer
    });
  }
});

/* ---------- SIGNALING ---------- */

socket.on("signal", async (data) => {

  if (!pc) return;

  if (data.type === "offer") {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

    const answer =
      await pc.createAnswer();

    await pc.setLocalDescription(
      answer
    );

    socket.emit("signal", {

      code: currentCode,

      data: answer
    });

  } else if (
    data.type === "answer"
  ) {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

  } else {

    try {

      await pc.addIceCandidate(
        new RTCIceCandidate(data)
      );

    } catch {}
  }
});

/* ---------- PEER LEFT ---------- */

socket.on("peer_left", () => {

  location.reload();

});

/* ---------- ENTER KEY ---------- */

document
.getElementById("code")
.addEventListener("keydown", (e) => {

  if (e.key === "Enter") {

    join();
  }
});

/* ---------- AI TEST KEY ---------- */

window.addEventListener(
  "keydown",
  (e) => {

    if (e.key === "a") {

      toggleAI();
    }
  }
);

/* ---------- REMOTE VIDEO ---------- */

const remoteVideo =
  document.getElementById("remote");

/* ---------- DRAG ---------- */

let startX = 0;
let startY = 0;

let isDragging = false;

remoteVideo.addEventListener(
  "mousedown",
  (e) => {

    isDragging = true;

    startX = e.clientX - posX;
    startY = e.clientY - posY;

    remoteVideo.style.cursor =
      "grabbing";
  }
);

window.addEventListener(
  "mousemove",
  (e) => {

    if (!isDragging) return;

    posX = e.clientX - startX;
    posY = e.clientY - startY;

    updateTransform();
  }
);

window.addEventListener(
  "mouseup",
  () => {

    isDragging = false;

    remoteVideo.style.cursor =
      "grab";
  }
);

/* ---------- DOUBLE CLICK ---------- */

remoteVideo.addEventListener(
  "dblclick",
  () => {

    toggleMode();
  }
);

/* ---------- DESKTOP ZOOM ---------- */

remoteVideo.addEventListener(
  "wheel",
  (e) => {

    e.preventDefault();

    scale += e.deltaY * -0.001;

    scale = Math.min(
      Math.max(1, scale),
      4
    );

    updateTransform();

  },
  { passive: false }
);

/* ---------- MOBILE PINCH ---------- */

let initialDistance = null;

remoteVideo.addEventListener(
  "touchmove",
  (e) => {

    if (e.touches.length === 2) {

      e.preventDefault();

      const dx =
        e.touches[0].clientX -
        e.touches[1].clientX;

      const dy =
        e.touches[0].clientY -
        e.touches[1].clientY;

      const distance =
        Math.sqrt(dx * dx + dy * dy);

      if (!initialDistance) {

        initialDistance =
          distance;
      }

      scale *=
        distance /
        initialDistance;

      scale = Math.min(
        Math.max(1, scale),
        4
      );

      initialDistance =
        distance;

      updateTransform();
    }

  },
  { passive: false }
);

remoteVideo.addEventListener(
  "touchend",
  () => {

    initialDistance = null;
  }
);

/* ---------- MOBILE DRAG ---------- */

let touchStartX = 0;
let touchStartY = 0;

remoteVideo.addEventListener(
  "touchstart",
  (e) => {

    if (e.touches.length === 1) {

      touchStartX =
        e.touches[0].clientX -
        posX;

      touchStartY =
        e.touches[0].clientY -
        posY;
    }

  },
  { passive: false }
);

remoteVideo.addEventListener(
  "touchmove",
  (e) => {

    if (e.touches.length === 1) {

      posX =
        e.touches[0].clientX -
        touchStartX;

      posY =
        e.touches[0].clientY -
        touchStartY;

      updateTransform();
    }

  },
  { passive: false }
);

/* ---------- MOBILE DOUBLE TAP ---------- */

let mobileTapCount = 0;
let lastTap = 0;

remoteVideo.addEventListener(
  "touchend",
  () => {

    const now = Date.now();

    if (now - lastTap < 300) {

      mobileTapCount++;

    } else {

      mobileTapCount = 1;
    }

    if (mobileTapCount === 2) {

      toggleMode();
    }

    lastTap = now;
  }
);

/* ---------- FOCUS ---------- */

window.onload = () => {

  document
  .getElementById("code")
  .focus();
};

</script>

</body>
</html>
