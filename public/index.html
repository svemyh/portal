<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>portal</title>

<style>

* {
  font-family: "Courier New", monospace;
  box-sizing: border-box;
}

body {

  margin: 0;

  background: black;
  color: white;

  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
}

#title {

  position: fixed;

  top: 18px;
  left: 50%;

  transform: translateX(-50%);

  z-index: 9000;

  text-align: center;

  font-size: 14px;
}

#title span {

  font-size: 11px;
  opacity: 0.6;
}

#entry {

  position: relative;
  z-index: 5000;
}

input {

  background: black;
  color: white;

  border: 1px solid white;

  padding: 10px;
}

button {

  padding: 10px;

  background: white;
  color: black;

  border: none;

  margin-left: 10px;

  cursor: pointer;
}

#status {

  position: fixed;

  top: 55px;
  left: 50%;

  transform: translateX(-50%);

  z-index: 5000;

  font-size: 12px;
}

/* ---------- VIDEO ---------- */

#remote {

  position: fixed;

  top: 50%;
  left: 50%;

  width: 575px;
  height: 575px;

  max-width: 92vw;
  max-height: 92vw;

  object-fit: cover;

  background: black;

  transform:
    translate(-50%, -50%)
    translate(0px,0px)
    scale(1);

  transform-origin: center center;

  border: 1px solid rgba(255,255,255,0.08);

  z-index: 1000;

  touch-action: none;

  cursor: grab;
}

#local {

  position: fixed;

  width: 1px;
  height: 1px;

  opacity: 0;

  pointer-events: none;
}

/* ---------- FILE BOX ---------- */

#fileBox {

  position: fixed;

  width: 240px;
  height: 240px;

  right: 25px;
  bottom: 25px;

  background: rgba(0,0,0,0.95);

  border: 1px solid rgba(255,255,255,0.15);

  z-index: 3000;

  display: flex;
  justify-content: center;
  align-items: center;

  text-align: center;

  font-size: 12px;
  letter-spacing: 1px;

  cursor: grab;

  user-select: none;

  touch-action: none;

  transform:
    translate(0px,0px)
    scale(1);
}

#fileBox.dragging {

  border-color: white;
}

/* ---------- OVERLAYS ---------- */

.overlay {

  position: fixed;

  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%);

  font-size: 16px;
  letter-spacing: 2px;

  z-index: 10000;

  opacity: 0;

  pointer-events: none;

  transition: opacity 0.2s ease;
}

</style>
</head>

<body>

<div id="title">
  portal<br>
  <span>v0.0.6</span>
</div>

<div id="status">
  idle
</div>

<div id="entry">

  <input
    id="code"
    placeholder="enter code">

  <button onclick="join()">
    enter
  </button>

</div>

<video
  id="local"
  autoplay
  muted
  playsinline>
</video>

<video
  id="remote"
  autoplay
  playsinline>
</video>

<div id="fileBox">
  DROP FILE
</div>

<div
  id="overlay"
  class="overlay">
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let pc;
let dataChannel;
let receiveChannel;

let localStream;
let currentCode;

/* ---------- VIDEO STATE ---------- */

let videoX = 0;
let videoY = 0;
let videoScale = 1;

/* ---------- FILE STATE ---------- */

let fileX = 0;
let fileY = 0;
let fileScale = 1;

/* ---------- CONTROL ---------- */

let controlTarget = "video";

/* ---------- ELEMENTS ---------- */

const remoteVideo =
  document.getElementById("remote");

const fileBox =
  document.getElementById("fileBox");

const overlay =
  document.getElementById("overlay");

/* ---------- OVERLAY ---------- */

function flash(text) {

  overlay.innerText = text;

  overlay.style.opacity = "1";

  clearTimeout(overlay.timeout);

  overlay.timeout = setTimeout(() => {

    overlay.style.opacity = "0";

  }, 900);
}

/* ---------- JOIN ---------- */

async function join() {

  const code =
    document.getElementById("code")
    .value
    .trim();

  if (!code) return;

  currentCode = code;

  localStream =
    await navigator.mediaDevices.getUserMedia({

      video: true,
      audio: true
    });

  document
  .getElementById("local")
  .srcObject = localStream;

  socket.emit("join", code);

  document
  .getElementById("entry")
  .style.display = "none";

  document
  .getElementById("status")
  .innerText = "waiting...";
}

/* ---------- PEER ---------- */

socket.on("peer", async ({ initiator }) => {

  pc = new RTCPeerConnection({

    iceServers: [

      {
        urls:
          "stun:stun.l.google.com:19302"
      },

      {
        urls: [
          "turn:YOUR_VULTR_IP:3478?transport=udp",
          "turn:YOUR_VULTR_IP:3478?transport=tcp"
        ],

        username: "portal",
        credential: "portal_password"
      }
    ]
  });

  /* ---------- FILE CHANNEL ---------- */

  if (initiator) {

    dataChannel =
      pc.createDataChannel("files", {

        ordered: true
      });

    setupDataChannel(dataChannel);
  }

  pc.ondatachannel = (event) => {

    receiveChannel = event.channel;

    setupDataChannel(receiveChannel);
  };

  localStream.getTracks().forEach(track => {

    pc.addTrack(
      track,
      localStream
    );
  });

  pc.ontrack = (event) => {

    remoteVideo.srcObject =
      event.streams[0];

    document
    .getElementById("status")
    .innerText = "connected";
  };

  pc.onicecandidate = (event) => {

    if (event.candidate) {

      socket.emit("signal", {

        code: currentCode,

        data: event.candidate
      });
    }
  };

  if (initiator) {

    const offer =
      await pc.createOffer();

    await pc.setLocalDescription(
      offer
    );

    socket.emit("signal", {

      code: currentCode,

      data: offer
    });
  }
});

/* ---------- SIGNAL ---------- */

socket.on("signal", async (data) => {

  if (!pc) return;

  if (data.type === "offer") {

    await pc.setRemoteDescription(data);

    const answer =
      await pc.createAnswer();

    await pc.setLocalDescription(
      answer
    );

    socket.emit("signal", {

      code: currentCode,

      data: answer
    });

  } else if (
    data.type === "answer"
  ) {

    await pc.setRemoteDescription(data);

  } else {

    try {

      await pc.addIceCandidate(data);

    } catch {}
  }
});

/* ---------- TRANSFORMS ---------- */

function updateVideoTransform() {

  remoteVideo.style.transform = `
    translate(-50%, -50%)
    translate(${videoX}px, ${videoY}px)
    scale(${videoScale})
  `;
}

function updateFileTransform() {

  fileBox.style.transform = `
    translate(${fileX}px, ${fileY}px)
    scale(${fileScale})
  `;
}

/* ---------- CONTROL TOGGLE ---------- */

function toggleControl() {

  controlTarget =
    controlTarget === "video"
      ? "file"
      : "video";

  flash(
    controlTarget.toUpperCase()
  );
}

/* ---------- DOUBLE CLICK ---------- */

window.addEventListener(
  "dblclick",
  toggleControl
);

/* ---------- DRAG ---------- */

let dragging = false;

let startX = 0;
let startY = 0;

window.addEventListener(
  "mousedown",
  (e) => {

    dragging = true;

    if (
      controlTarget === "video"
    ) {

      startX =
        e.clientX - videoX;

      startY =
        e.clientY - videoY;

    } else {

      startX =
        e.clientX - fileX;

      startY =
        e.clientY - fileY;
    }
  }
);

window.addEventListener(
  "mousemove",
  (e) => {

    if (!dragging) return;

    if (
      controlTarget === "video"
    ) {

      videoX =
        e.clientX - startX;

      videoY =
        e.clientY - startY;

      updateVideoTransform();

    } else {

      fileX =
        e.clientX - startX;

      fileY =
        e.clientY - startY;

      updateFileTransform();
    }
  }
);

window.addEventListener(
  "mouseup",
  () => {

    dragging = false;
  }
);

/* ---------- WHEEL ---------- */

window.addEventListener(
  "wheel",
  (e) => {

    e.preventDefault();

    if (
      controlTarget === "video"
    ) {

      videoScale +=
        e.deltaY * -0.001;

      videoScale =
        Math.min(
          Math.max(1, videoScale),
          4
        );

      updateVideoTransform();

    } else {

      fileScale +=
        e.deltaY * -0.001;

      fileScale =
        Math.min(
          Math.max(1, fileScale),
          4
        );

      updateFileTransform();
    }

  },
  { passive: false }
);

/* ---------- FILE DROP ---------- */

fileBox.addEventListener(
  "dragover",
  (e) => {

    e.preventDefault();

    fileBox.classList.add(
      "dragging"
    );
  }
);

fileBox.addEventListener(
  "dragleave",
  () => {

    fileBox.classList.remove(
      "dragging"
    );
  }
);

fileBox.addEventListener(
  "drop",
  async (e) => {

    e.preventDefault();

    fileBox.classList.remove(
      "dragging"
    );

    const file =
      e.dataTransfer.files[0];

    if (!file) return;

    flash("SENDING...");

    const buffer =
      await file.arrayBuffer();

    sendFile(
      buffer,
      file.name
    );
  }
);

/* ---------- SEND FILE ---------- */

function sendFile(
  buffer,
  filename
) {

  const chunkSize = 64000;

  const total =
    Math.ceil(
      buffer.byteLength /
      chunkSize
    );

  const channel =
    dataChannel ||
    receiveChannel;

  channel.send(JSON.stringify({

    type: "meta",

    filename
  }));

  for (
    let i = 0;
    i < total;
    i++
  ) {

    const chunk =
      buffer.slice(

        i * chunkSize,

        (i + 1) * chunkSize
      );

    channel.send(chunk);
  }

  channel.send(JSON.stringify({

    type: "end"
  }));

  flash("SENT");
}

/* ---------- RECEIVE ---------- */

let incomingChunks = [];
let incomingName = "download.zip";

function setupDataChannel(channel) {

  channel.binaryType =
    "arraybuffer";

  channel.onmessage = (event) => {

    if (
      typeof event.data === "string"
    ) {

      const msg =
        JSON.parse(event.data);

      if (
        msg.type === "meta"
      ) {

        incomingName =
          msg.filename + ".zip";

        incomingChunks = [];

        flash("RECEIVING...");
      }

      if (
        msg.type === "end"
      ) {

        const blob =
          new Blob(incomingChunks);

        const url =
          URL.createObjectURL(blob);

        const a =
          document.createElement("a");

        a.href = url;

        a.download =
          incomingName;

        a.click();

        flash(
          "DOWNLOAD COMPLETE"
        );
      }

    } else {

      incomingChunks.push(
        event.data
      );
    }
  };
}

/* ---------- ENTER ---------- */

document
.getElementById("code")
.addEventListener(
  "keydown",
  (e) => {

    if (e.key === "Enter") {

      join();
    }
  }
);

</script>

</body>
</html>
