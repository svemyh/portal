<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>portal</title>

<style>

* {
  font-family: "Courier New", Courier, monospace;
  box-sizing: border-box;
}

body {
  margin: 0;
  background: black;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
  min-height: 100dvh;

  overflow: hidden;
}

#container {
  text-align: center;
}

#title {
  position: absolute;

  top: 20px;
  left: 50%;

  transform: translateX(-50%);

  font-size: 14px;
  letter-spacing: 1px;

  z-index: 1001;
}

#title span {
  font-size: 11px;
  opacity: 0.6;
}

video {
  width: 40vw;
  max-width: 400px;

  margin: 10px;

  background: black;
}

input {
  background: black;
  color: white;

  border: 1px solid white;

  padding: 10px;
}

button {
  margin-left: 10px;

  padding: 10px;

  background: white;
  color: black;

  border: none;

  cursor: pointer;
}

#status {
  position: relative;
  z-index: 1001;

  margin: 10px 0;
}

/* CONNECTED STATE */

.connected #local,
.connected #label-local,
.connected #label-remote {
  display: none;
}

.connected #remote {

  position: fixed;

  top: 50%;
  left: 50%;

  width: 800px;
  height: 800px;

  max-width: 100vw;
  max-height: 100dvh;

  transform: translate(-50%, -50%) scale(1);

  object-fit: cover;

  background: black;

  z-index: 999;

  touch-action: none;
}

/* MOBILE */

@media (max-width: 900px) {

  .connected #remote {

    width: 100vw;
    height: 100vw;

    max-height: 100dvh;
  }
}

</style>
</head>

<body>

<div id="container">

  <div id="title">
    portal<br>
    <span>v0.0.2</span>
  </div>

  <div id="entry">

    <input
      id="code"
      placeholder="enter code" />

    <button onclick="join()">
      enter
    </button>

  </div>

  <div id="stage" style="display:none;">

    <div id="label-local">#?</div>

    <video
      id="local"
      autoplay
      muted
      playsinline>
    </video>

    <div id="status">
      waiting...
    </div>

    <div id="label-remote">#?</div>

    <video
      id="remote"
      autoplay
      playsinline>
    </video>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let localStream;
let pc;
let currentCode;
let myUserNumber = null;

/* ---------- JOIN ---------- */

async function join() {

  const code =
    document.getElementById("code")
    .value
    .trim();

  if (!code) return;

  currentCode = code;

  localStream =
    await navigator.mediaDevices.getUserMedia({

      video: {
        width: { ideal: 640 },
        height: { ideal: 480 },
        frameRate: { ideal: 24, max: 30 }
      },

      audio: true
    });

  document.getElementById("local").srcObject =
    localStream;

  document.getElementById("entry").style.display =
    "none";

  document.getElementById("stage").style.display =
    "block";

  document.getElementById("status").innerText =
    "waiting...";

  socket.emit("join", code);
}

/* ---------- USER ASSIGNMENT ---------- */

socket.on("assigned", ({ userNumber }) => {

  myUserNumber = userNumber;

  document.getElementById("label-local").innerText =
    "#" + userNumber;
});

/* ---------- ROOM FULL ---------- */

socket.on("full", () => {

  alert("room full");

  location.reload();
});

/* ---------- PEER CONNECT ---------- */

socket.on("peer", async ({ initiator }) => {

  document.getElementById("status").innerText =
    "connecting...";

  document.getElementById("label-remote").innerText =
    "#" + (myUserNumber === 1 ? 2 : 1);

  pc = new RTCPeerConnection({

    iceServers: [

      {
        urls: "stun:stun.l.google.com:19302"
      },

      {
        urls: [
          "turn:YOUR_REAL_VULTR_IP:3478?transport=udp",
          "turn:YOUR_REAL_VULTR_IP:3478?transport=tcp"
        ],

        username: "portal",
        credential: "portal_password"
      }
    ]
  });

  localStream.getTracks().forEach(track => {

    pc.addTrack(track, localStream);

  });

  /* ---------- BITRATE STABILIZATION ---------- */

  pc.getSenders().forEach(sender => {

    if (
      sender.track &&
      sender.track.kind === "video"
    ) {

      const params = sender.getParameters();

      if (!params.encodings) {
        params.encodings = [{}];
      }

      params.encodings[0].maxBitrate = 500000;

      sender.setParameters(params);
    }
  });

  /* ---------- REMOTE STREAM ---------- */

  pc.ontrack = (event) => {

    const remoteVideo =
      document.getElementById("remote");

    remoteVideo.srcObject =
      event.streams[0];

    remoteVideo.onloadedmetadata = async () => {

      try {

        await remoteVideo.play();

        document.getElementById("status").innerText =
          "#" + currentCode + " - #" + myUserNumber;

        document.body.classList.add("connected");

      } catch (err) {

        console.error(err);

      }
    };
  };

  /* ---------- ICE ---------- */

  pc.onicecandidate = (event) => {

    if (event.candidate) {

      socket.emit("signal", {
        code: currentCode,
        data: event.candidate
      });
    }
  };

  /* ---------- CONNECTION MONITOR ---------- */

  pc.onconnectionstatechange = () => {

    if (
      pc.connectionState === "disconnected" ||
      pc.connectionState === "failed" ||
      pc.connectionState === "closed"
    ) {

      location.reload();
    }
  };

  /* ---------- OFFER ---------- */

  if (initiator) {

    const offer =
      await pc.createOffer();

    await pc.setLocalDescription(offer);

    socket.emit("signal", {
      code: currentCode,
      data: offer
    });
  }
});

/* ---------- SIGNALING ---------- */

socket.on("signal", async (data) => {

  if (!pc) return;

  if (data.type === "offer") {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

    const answer =
      await pc.createAnswer();

    await pc.setLocalDescription(answer);

    socket.emit("signal", {
      code: currentCode,
      data: answer
    });

  } else if (data.type === "answer") {

    await pc.setRemoteDescription(
      new RTCSessionDescription(data)
    );

  } else {

    try {

      await pc.addIceCandidate(
        new RTCIceCandidate(data)
      );

    } catch {}
  }
});

/* ---------- PEER LEFT ---------- */

socket.on("peer_left", () => {

  location.reload();

});

/* ---------- ENTER KEY ---------- */

document.getElementById("code")
.addEventListener("keydown", (e) => {

  if (e.key === "Enter") {
    join();
  }
});

/* ---------- PINCH / ZOOM ---------- */

const remoteVideo =
  document.getElementById("remote");

let currentScale = 1;

remoteVideo.addEventListener("wheel", (e) => {

  e.preventDefault();

  currentScale += e.deltaY * -0.001;

  currentScale = Math.min(
    Math.max(1, currentScale),
    4
  );

  remoteVideo.style.transform =
    `translate(-50%, -50%) scale(${currentScale})`;

}, { passive: false });

/* ---------- DOUBLE TAP FULLSCREEN ---------- */

let lastTap = 0;

remoteVideo.addEventListener("touchend", async () => {

  const now = Date.now();

  if (now - lastTap < 300) {

    if (!document.fullscreenElement) {

      try {

        await remoteVideo.requestFullscreen();

      } catch {}

    } else {

      document.exitFullscreen();

    }
  }

  lastTap = now;
});

/* ---------- FOCUS ---------- */

window.onload = () => {

  document.getElementById("code").focus();

};

</script>

</body>
</html>
