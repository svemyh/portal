<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>portal</title>

<style>
* { font-family: "Courier New", Courier, monospace; }

body {
  margin: 0;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#container { text-align: center; }

#title {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  letter-spacing: 1px;
}

#title span {
  font-size: 11px;
  opacity: 0.6;
}

video {
  width: 40vw;
  max-width: 400px;
  margin: 10px;
  background: black;
}

input {
  background: black;
  color: white;
  border: 1px solid white;
  padding: 10px;
}

button {
  margin-left: 10px;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="container">

  <div id="title">
    portal<br>
    <span>v0.0.1</span>
  </div>

  <div id="entry">
    <input id="code" placeholder="enter code" />
    <button onclick="join()">enter</button>
  </div>

  <div id="stage" style="display:none;">
    <video id="local" autoplay muted playsinline></video>
    <video id="remote" autoplay playsinline></video>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let localStream;
let pc;
let currentCode;

async function join() {
  const code = document.getElementById("code").value.trim();
  if (!code) return;

  currentCode = code;

  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById("local").srcObject = localStream;

  document.getElementById("entry").style.display = "none";
  document.getElementById("stage").style.display = "block";

  socket.emit("join", code);
}

socket.on("full", () => {
  alert("room full");
  location.reload();
});

socket.on("peer", async ({ initiator }) => {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
  });

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream);
  });

  pc.ontrack = (event) => {
    document.getElementById("remote").srcObject = event.streams[0];
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("signal", { code: currentCode, data: event.candidate });
    }
  };

  if (initiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal", { code: currentCode, data: offer });
  }
});

socket.on("signal", async (data) => {
  if (!pc) return;

  if (data.type === "offer") {
    await pc.setRemoteDescription(new RTCSessionDescription(data));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    socket.emit("signal", { code: currentCode, data: answer });
  } else if (data.type === "answer") {
    await pc.setRemoteDescription(new RTCSessionDescription(data));
  } else {
    try {
      await pc.addIceCandidate(new RTCIceCandidate(data));
    } catch {}
  }
});

// UX improvements (kept)
document.getElementById("code").addEventListener("keydown", (e) => {
  if (e.key === "Enter") join();
});

window.onload = () => {
  document.getElementById("code").focus();
};
</script>

</body>
</html>
